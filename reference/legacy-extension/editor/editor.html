<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MyLoom — Screenshot</title>
  <link rel="stylesheet" href="../ui/theme.css" />
  <link rel="stylesheet" href="editor.css" />
</head>
<body>
<div class="page">

  <!-- ── Topbar ── -->
  <header class="topbar">
    <div class="topbar-brand">
      <svg width="20" height="20" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="9" r="9" fill="url(#ebg)"/>
        <circle cx="9" cy="9" r="5.5" stroke="#fff" stroke-width="1.5" fill="none"/>
        <circle cx="9" cy="9" r="2.5" fill="#fff"/>
        <defs><linearGradient id="ebg" x1="0" y1="0" x2="18" y2="18" gradientUnits="userSpaceOnUse">
          <stop stop-color="#8b6ef7"/><stop offset="1" stop-color="#5b3fb5"/>
        </linearGradient></defs>
      </svg>
      <span class="topbar-title">Screenshot Editor</span>
    </div>

    <!-- Annotation toolbar (shown inline in topbar on wide screens) -->
    <div id="toolbar" class="toolbar">
      <div class="tool-group">
        <button class="tool active" data-tool="cursor" title="No annotation">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 2l8 5-4.5 1-2 4L3 2z" fill="currentColor"/>
          </svg>
        </button>
        <button class="tool" data-tool="pen" title="Freehand pen">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M9.5 2.5l2 2-7 7-2.5.5.5-2.5 7-7z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="tool" data-tool="rect" title="Rectangle">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="2" y="2.5" width="10" height="9" rx="1" stroke="currentColor" stroke-width="1.3"/>
          </svg>
        </button>
        <button class="tool" data-tool="arrow" title="Arrow">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 11l8-8M11 3H7M11 3v4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="toolbar-sep"></div>
      <div id="colors" class="color-group"></div>
      <div class="toolbar-sep"></div>
      <button id="undoBtn" class="btn btn-ghost btn-sm">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M2 5.5h6a3.5 3.5 0 0 1 0 7H4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <path d="M4.5 2.5L2 5.5l2.5 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Undo
      </button>
    </div>
  </header>

  <!-- ── Canvas area ── -->
  <div class="canvas-area">
    <div class="canvas-scroll">
      <canvas id="canvas" class="canvas"></canvas>
    </div>
  </div>

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-inner">
      <h2 class="sidebar-heading">Save &amp; share</h2>
      <p class="sidebar-sub">Saved straight to your cloud — link is ready instantly.</p>

      <div class="form-group">
        <label class="form-label">Title</label>
        <input id="titleInput" type="text" placeholder="Screenshot" />
      </div>
      <p id="stats" class="stats-text"></p>

      <!-- Progress -->
      <div id="progressWrap" class="progress-wrap hidden">
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
        <p id="progressLabel" class="progress-label">Uploading…</p>
      </div>

      <!-- Share result -->
      <div id="shareWrap" class="share-wrap hidden">
        <div class="share-header">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M7.5 1.5a6 6 0 1 1 0 12 6 6 0 0 1 0-12zM5.5 7.5l1.5 1.5 3-3" stroke="#15803d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Saved to your cloud</span>
        </div>
        <div class="share-link-row">
          <input id="shareLink" type="text" class="share-link-input" readonly />
          <button id="copyLinkBtn" class="btn btn-primary btn-sm">Copy</button>
        </div>
        <a id="openLink" class="open-link" target="_blank" rel="noopener">Open in Drive →</a>
      </div>

      <!-- Actions -->
      <div class="sidebar-actions">
        <button id="saveBtn" class="btn btn-primary btn-lg" style="width:100%">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M7.5 2v8M3.5 6.5l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M1.5 11.5v1a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Save to cloud
        </button>
        <button id="downloadBtn" class="btn btn-secondary" style="width:100%">Download PNG</button>
      </div>

      <p id="error" class="alert alert-error hidden"></p>
    </div>
  </aside>

</div>
<script type="module" src="editor.js"></script>
</body>
</html>
