<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0A0B" />

    <!-- Primary SEO -->
    <title>Recio — Screen recording that lives in your own cloud</title>
    <meta
      name="description"
      content="Recio is a screen recorder where your videos are yours. Record your screen and webcam, drop comments, and share a link — with every recording saved to your own Google Drive, Dropbox, or Recio cloud. No storage caps, no lock-in."
    />
    <meta name="keywords" content="screen recorder, loom alternative, screen recording, webcam recording, video messaging, google drive, dropbox, own your storage, Recio" />
    <link rel="canonical" href="https://recio.app/" />
    <meta name="robots" content="index, follow" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Recio" />
    <meta property="og:title" content="Recio — Screen recording that lives in your own cloud" />
    <meta
      property="og:description"
      content="Record your screen and webcam, share a link, and keep every video in your own cloud. The screen recorder that's actually yours."
    />
    <meta property="og:url" content="https://recio.app/" />
    <meta property="og:image" content="https://recio.app/og.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Recio — Screen recording that lives in your own cloud" />
    <meta
      name="twitter:description"
      content="Record your screen and webcam, share a link, and keep every video in your own cloud."
    />
    <meta name="twitter:image" content="https://recio.app/og.png" />

    <!-- Fonts: Geist (UI) + JetBrains Mono (metadata) + Fraunces (display serif) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
