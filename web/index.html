<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />

    <!-- Apply the saved light/dark theme before first paint (no flash). Keep the
         storage key in sync with web/src/stores/themeStore.ts (THEME_KEY). -->
    <script>
      (function () {
        try {
          var m = localStorage.getItem("vyooom-theme") || "system";
          var dark = m === "dark" || (m === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) {
            document.documentElement.classList.add("dark");
            var meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute("content", "#0b0d12");
          }
        } catch (e) {}
      })();
    </script>

    <!-- Primary SEO -->
    <title>Vyooom — Screen recording that lives in your own cloud</title>
    <meta
      name="description"
      content="Vyooom is a screen recorder where your videos are yours. Record your screen and webcam, drop comments, and share a link — with every recording saved to your own Google Drive, Dropbox, or Vyooom cloud. No storage caps, no lock-in."
    />
    <meta name="keywords" content="screen recorder, loom alternative, screen recording, webcam recording, video messaging, google drive, dropbox, own your storage, Vyooom" />
    <link rel="canonical" href="https://recio.app/" />
    <meta name="robots" content="index, follow" />

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png" />
    <link rel="icon" type="image/png" sizes="any" href="/assets/vyoom-icon.png" />
    <link rel="apple-touch-icon" href="/assets/vyoom-icon.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Vyooom" />
    <meta property="og:title" content="Vyooom — Screen recording that lives in your own cloud" />
    <meta
      property="og:description"
      content="Record your screen and webcam, share a link, and keep every video in your own cloud. The screen recorder that's actually yours."
    />
    <meta property="og:url" content="https://recio.app/" />
    <meta property="og:image" content="https://recio.app/og.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Vyooom — Screen recording that lives in your own cloud" />
    <meta
      name="twitter:description"
      content="Record your screen and webcam, share a link, and keep every video in your own cloud."
    />
    <meta name="twitter:image" content="https://recio.app/og.png" />

    <!-- Fonts: Hanken Grotesk (UI/display) + JetBrains Mono (metadata) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
