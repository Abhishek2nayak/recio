<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Recio — Capture & share knowledge</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   RECIO — design tokens
   Concept: framing & transferring knowledge. Cool precision,
   light-first chrome, near-black recording HUD.
   ============================================================ */
:root{
  /* cool neutral surfaces (light-first) */
  --paper:      oklch(0.984 0.003 255);
  --surface:    oklch(1 0 0);
  --surface-2:  oklch(0.972 0.004 255);
  --surface-3:  oklch(0.955 0.005 255);
  --line:       oklch(0.918 0.005 258);
  --line-2:     oklch(0.872 0.006 258);
  --ink:        oklch(0.235 0.013 262);
  --ink-2:      oklch(0.455 0.011 262);
  --ink-3:      oklch(0.612 0.009 262);
  --ink-4:      oklch(0.722 0.007 262);

  /* near-black recording HUD glass */
  --hud:        oklch(0.205 0.011 262);
  --hud-2:      oklch(0.262 0.012 262);
  --hud-line:   oklch(0.36 0.012 262);
  --hud-ink:    oklch(0.96 0.004 255);
  --hud-ink-2:  oklch(0.74 0.008 258);

  /* accent (overridden per theme) — default = Pulse */
  --accent:     oklch(0.77 0.175 150);
  --accent-2:   oklch(0.70 0.175 150);
  --accent-ink: oklch(0.22 0.05 150);
  --accent-soft:oklch(0.95 0.045 150);
  --accent-ring:oklch(0.77 0.175 150 / 0.35);
  --live:       oklch(0.77 0.175 150);

  /* radius (tweakable) */
  --r-sm: 7px;  --r: 11px; --r-lg: 16px; --r-xl: 22px; --r-2xl: 30px; --r-pill: 999px;

  /* elevation — cool, soft */
  --e1: 0 1px 2px rgba(18,20,28,.05), 0 1px 1px rgba(18,20,28,.04);
  --e2: 0 6px 16px -4px rgba(18,20,28,.10), 0 2px 5px -2px rgba(18,20,28,.06);
  --e3: 0 18px 44px -12px rgba(18,20,28,.20), 0 5px 12px -6px rgba(18,20,28,.10);
  --e-hud: 0 24px 60px -12px rgba(0,0,0,.55), 0 6px 18px -6px rgba(0,0,0,.4), 0 0 0 .5px rgba(255,255,255,.06) inset;

  /* type */
  --sans: "Hanken Grotesk", ui-sans-serif, system-ui, sans-serif;
  --mono: "JetBrains Mono", ui-monospace, "SF Mono", monospace;

  /* motion */
  --ease: cubic-bezier(.2,.7,.2,1);
  --ease-out: cubic-bezier(.16,1,.3,1);
  --t1: 120ms; --t2: 220ms; --t3: 360ms;

  --density: 1;
}

/* ---------- THEME: Tide (electric cyan) ---------- */
[data-theme="tide"]{
  --accent:     oklch(0.72 0.13 232);
  --accent-2:   oklch(0.65 0.135 235);
  --accent-ink: oklch(0.99 0.01 232);
  --accent-soft:oklch(0.95 0.035 232);
  --accent-ring:oklch(0.72 0.13 232 / 0.35);
  --live:       oklch(0.72 0.13 232);
}
/* ---------- THEME: Ink (monochrome restraint) ---------- */
[data-theme="ink"]{
  --accent:     oklch(0.30 0.012 262);
  --accent-2:   oklch(0.22 0.012 262);
  --accent-ink: oklch(0.98 0.003 255);
  --accent-soft:oklch(0.93 0.004 258);
  --accent-ring:oklch(0.30 0.012 262 / 0.28);
  --live:       oklch(0.76 0.18 150); /* one electric spark survives */
}

*{ box-sizing: border-box; }
html,body{ margin:0; height:100%; }
body{
  font-family: var(--sans);
  background: var(--paper);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow: hidden;
}
#root{ height:100%; }
::selection{ background: var(--accent-ring); }

.mono{ font-family: var(--mono); font-feature-settings:"tnum" 1; }
button{ font-family: inherit; }

/* scrollbars inside app */
.r-scroll{ scrollbar-width: thin; scrollbar-color: var(--line-2) transparent; }
.r-scroll::-webkit-scrollbar{ width:10px; height:10px; }
.r-scroll::-webkit-scrollbar-thumb{ background: var(--line-2); border-radius:99px; border:3px solid transparent; background-clip:content-box; }
.r-scroll::-webkit-scrollbar-thumb:hover{ background: var(--ink-4); border:3px solid transparent; background-clip:content-box; }

@keyframes r-fade-up { from{ opacity:0; transform: translateY(10px); } to{ opacity:1; transform:none; } }
@keyframes r-fade { from{ opacity:0; } to{ opacity:1; } }
@keyframes r-pulse-ring {
  0%{ box-shadow: 0 0 0 0 var(--accent-ring); }
  70%{ box-shadow: 0 0 0 14px transparent; }
  100%{ box-shadow: 0 0 0 0 transparent; }
}
@keyframes r-live-blink { 0%,100%{ opacity:1; } 50%{ opacity:.35; } }
@keyframes r-spin { to{ transform: rotate(360deg); } }
@keyframes r-sheen { from{ background-position: -160% 0; } to{ background-position: 260% 0; } }
@media (prefers-reduced-motion: reduce){ *{ animation-duration:.001ms !important; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="recio-icons.jsx"></script>

<script type="text/babel" src="recio-app.jsx"></script>
</body>
</html>
